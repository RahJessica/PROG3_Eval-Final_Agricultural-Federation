openapi: 3.1.0
info:
  title: Federation Agricole API
  version: 1.0.0
  description: API de gestion des collectivités agricoles à Madagascar

servers:
  - url: http://localhost:8080

paths:

  /collectivites/demandes:
    post:
      summary: Créer une demande d’ouverture de collectivité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandeCollectivite'
      responses:
        '201': { description: Demande créée }
        '422': { description: Conditions non respectées }

  /collectivites/demandes/{id}:
    patch:
      summary: Valider ou refuser une demande
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                statut:
                  type: string
                  enum:
                    - APPROUVEE
                    - REFUSEE
      responses:
        '200': { description: Statut mis à jour }
        '404': { description: Demande non trouvée }

  /collectivites:
    get:
      summary: Lister les collectivités
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Collectivite' }

    post:
      summary: Créer une collectivité après validation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Collectivite' }
      responses:
        '201': { description: Créée }
        '403': { description: Demande non validée }

  /collectivites/{id}/admissions:
    post:
      summary: Créer une demande d'admission
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DemandeAdmission' }
      responses:
        '201': { description: Demande d'admission créée }
        '400': {description: Données invalides}
        '422': {description: Parrain invalide ou ancienneté insuffisante}

  /admissions/{id}/paiement:
    post:
      summary: Payer les frais d’adhésion
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Paiement'
      responses:
        '200': { description: Paiement effectué }
        '400': {description: Montant incorrect}

  /admissions/{id}/valider:
    post:
      summary: Valider l'admission d'un membre
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '201': {description: Membre officiellement admis}
        '403': {description: Paiement non effectué}
        '404': {description: Demande non trouvée}

  /membres:
    get:
      summary: Liste des membres
      responses:
        '200':
          description: OK

  /membres/{id}:
    get:
      summary: Obtenir un membre
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
        '404': { description: Non trouvé }

  /membres/{id}/assiduite:
    get:
      summary: Calcul du taux d’assiduité
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: dateDebut
          schema:
            type: string
            format: date
        - in: query
          name: dateFin
          schema:
            type: string
            format: date
      responses:
        '200': { description: Taux calculé }

  /collectivites/{id}/cotisations:
    post:
      summary: Créer une cotisation
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Cotisation' }
      responses:
        '201': { description: Créée }

  /cotisations/{id}/paiements:
    post:
      summary: Enregistrer un paiement
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Paiement' }
      responses:
        '201': { description: Paiement enregistré }
    get:
      summary: Liste des paiements d'une cotisation
      parameters:
        - in: path
          name: id
          required: true
          schema:
              type: integer
      responses:
        '200':
          description: Liste des paiements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Paiement'

  /collectivites/{id}/versements:
    post:
      summary: Verser une part des cotisations à la fédération
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                montant: { type: number }
                periode: { type: string }
      responses:
        '201': {description: Versement effectué}

  /collectivites/{id}/comptes:
    post:
      summary: Créer un compte
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Compte' }
      responses:
        '201': { description: Compte créé }

    get:
      summary: Liste des comptes
      responses:
        '200': { description: OK }

  /comptes/{id}/solde:
    get:
      summary: Consulter le solde
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Solde retourné }

  /collectivites/{id}/activites:
    post:
      summary: Créer une activité
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Activite' }
      responses:
        '201': { description: Activité créée }

    get:
      summary: Liste des activités
      responses:
        '200': { description: OK }

  /activites/{id}/presences:
    post:
      summary: Enregistrer une présence
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Presence' }
      responses:
        '201': { description: Présence enregistrée }

  /collectivites/{id}/statistiques:
    get:
      summary: Statistiques de la collectivité
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Statistiques retournées }

components:

  schemas:

    DemandeCollectivite:
      type: object
      properties:
        nom: { type: string }
        ville: { type: string }
        specialite: { type: string }
        membresIds:
          type: array
          minItems: 10
          items: { type: integer }

    Collectivite:
      type: object
      properties:
        id: { type: integer }
        nom: { type: string }
        ville: { type: string }
        specialite: { type: string }

    Admission:
      type: object
      properties:
        nom: { type: string }
        prenom: { type: string }
        email: { type: string }
        parrainId: { type: integer }

    Cotisation:
      type: object
      properties:
        montant: { type: number }
        type: { type: string }

    Paiement:
      type: object
      properties:
        montant: { type: number }
        mode: { type: string }

    Compte:
      type: object
      properties:
        type:
          type: string
          enum: [CAISSE, BANCAIRE, MOBILE_MONEY]

    Activite:
      type: object
      properties:
        titre: { type: string }
        date: { type: string, format: date }
        obligatoire: { type: boolean }

    Presence:
      type: object
      properties:
        membreId: { type: integer }
        statut:
          type: string
          enum: [PRESENT, ABSENT, EXCUSE]

    DemandeAdmission:
      type: object
      properties:
        nom: { type: string }
        prenom: { type: string }
        email: { type: string }
        telephone: { type: string }
        parrainId: { type: integer }